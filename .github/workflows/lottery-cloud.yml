name: Lottery Cloud Update

on:
  workflow_dispatch:
  schedule:
    # Runs every 20 minutes, offset from busy GitHub schedule times.
    # The Python script decides whether to publish prediction-only or
    # post-draw review + prediction based on Beijing time.
    - cron: "7,27,47 * * * *"

permissions:
  contents: write

concurrency:
  group: lottery-cloud-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run cloud update
        run: python lottery_predictor.py cloud
        timeout-minutes: 8

      - name: Commit generated site and data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports docs config.json
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update lottery prediction site"
            git pull --rebase origin main
            git push
          fi
